openapi: 3.0.0
info:
  title: Urban Farming API
  version: 1.0.0

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

paths:
  /api/v1/auth/register:
    post:
      summary: Register user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                email:
                  type: string
                password:
                  type: string
      responses:
        201:
          description: User created
  /api/v1/auth/login:
    post:
      summary: User Login
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  example: test@gmail.com
                password:
                  type: string
                  example: 123456

      responses:
        200:
          description: Login Successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  statusCode:
                    type: number
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      accessToken:
                        type: string
                      refreshToken:
                        type: string
                      user:
                        type: object
  /api/v1/vendors:
    post:
      summary: Create Vendor Profile
      tags:
        - Vendor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - userId
                - farmName
                - farmLocation
              properties:
                userId:
                  type: string
                farmName:
                  type: string
                farmLocation:
                  type: string
      responses:
        "201":
          description: Vendor created successfully

    get:
      summary: Get all vendors
      tags:
        - Vendor
      responses:
        "200":
          description: Vendors fetched successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      type: object